<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Merchant Policy Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#0d1c32",
                    "outline-variant": "#c5c6cd",
                    "on-primary-fixed": "#0d1c32",
                    "on-primary-container": "#76849f",
                    "secondary-fixed-dim": "#b8c8da",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#7e848c",
                    "on-secondary-container": "#556474",
                    "inverse-surface": "#303032",
                    "surface-bright": "#fbf9fb",
                    "on-secondary-fixed": "#0d1d2a",
                    "surface-variant": "#e4e2e4",
                    "surface": "#fbf9fb",
                    "tertiary-fixed": "#dde3eb",
                    "on-tertiary-fixed": "#161c22",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#161c22",
                    "on-error-container": "#93000a",
                    "secondary": "#50606f",
                    "secondary-fixed": "#d4e4f6",
                    "on-secondary-fixed-variant": "#394857",
                    "tertiary-fixed-dim": "#c1c7cf",
                    "on-tertiary-fixed-variant": "#41474e",
                    "on-secondary": "#ffffff",
                    "surface-container-highest": "#e4e2e4",
                    "outline": "#75777e",
                    "surface-container": "#efedef",
                    "surface-dim": "#dbd9db",
                    "surface-tint": "#515f78",
                    "inverse-on-surface": "#f2f0f2",
                    "surface-container-low": "#f5f3f5",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#d6e3ff",
                    "on-error": "#ffffff",
                    "background": "#fbf9fb",
                    "on-background": "#1b1b1d",
                    "on-primary-fixed-variant": "#39475f",
                    "surface-container-high": "#eae7ea",
                    "inverse-primary": "#b9c7e4",
                    "primary-fixed-dim": "#b9c7e4",
                    "on-surface": "#1b1b1d",
                    "tertiary": "#000000",
                    "error-container": "#ffdad6",
                    "on-surface-variant": "#44474d",
                    "primary": "#000000",
                    "secondary-container": "#d1e1f4",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "20px",
                    "sm": "8px",
                    "md": "16px",
                    "margin-page": "40px",
                    "lg": "24px",
                    "xl": "32px",
                    "base-unit": "4px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "headline-md": [
                            "Inter"
                    ],
                    "label-caps": [
                            "Inter"
                    ],
                    "headline-lg": [
                            "Inter"
                    ],
                    "mono-log": [
                            "Inter"
                    ],
                    "display-xl": [
                            "Inter"
                    ],
                    "body-base": [
                            "Inter"
                    ],
                    "body-sm": [
                            "Inter"
                    ]
            },
            "fontSize": {
                    "headline-md": [
                            "20px",
                            {
                                    "lineHeight": "28px",
                                    "fontWeight": "600"
                            }
                    ],
                    "label-caps": [
                            "12px",
                            {
                                    "lineHeight": "16px",
                                    "letterSpacing": "0.05em",
                                    "fontWeight": "600"
                            }
                    ],
                    "headline-lg": [
                            "24px",
                            {
                                    "lineHeight": "32px",
                                    "letterSpacing": "-0.01em",
                                    "fontWeight": "600"
                            }
                    ],
                    "mono-log": [
                            "13px",
                            {
                                    "lineHeight": "18px",
                                    "letterSpacing": "-0.01em",
                                    "fontWeight": "500"
                            }
                    ],
                    "display-xl": [
                            "36px",
                            {
                                    "lineHeight": "44px",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "700"
                            }
                    ],
                    "body-base": [
                            "16px",
                            {
                                    "lineHeight": "24px",
                                    "fontWeight": "400"
                            }
                    ],
                    "body-sm": [
                            "14px",
                            {
                                    "lineHeight": "20px",
                                    "fontWeight": "400"
                            }
                    ]
            }
    },
        },
      }
    </script>
<style>
        body { background-color: #fbf9fb; }
    </style>
</head>
<body class="antialiased min-h-screen relative font-body-base text-body-base text-on-background">
<!-- Mock Background (Merchants Management Grid) -->
<div class="p-margin-page pointer-events-none select-none blur-sm opacity-50">
<div class="mb-lg">
<h1 class="font-display-xl text-display-xl text-on-surface">Merchants Management</h1>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-lg">
<div class="bg-surface-container-lowest border border-outline-variant rounded p-lg h-64 shadow-sm"></div>
<div class="bg-surface-container-lowest border border-outline-variant rounded p-lg h-64 shadow-sm"></div>
<div class="bg-surface-container-lowest border border-outline-variant rounded p-lg h-64 shadow-sm"></div>
</div>
</div>
<!-- Dimming Overlay -->
<div class="fixed inset-0 bg-tertiary/30 z-40 backdrop-blur-[1px]"></div>
<!-- Side Drawer -->
<aside class="fixed right-0 top-0 h-screen w-full max-w-[440px] bg-surface-container-lowest z-50 flex flex-col shadow-2xl border-l border-outline-variant transform transition-transform duration-300 ease-in-out">
<!-- Header -->
<header class="flex items-center justify-between px-lg py-md border-b border-surface-variant bg-surface-container-lowest">
<h2 class="font-headline-md text-headline-md text-on-surface">Shopee - Policy Configuration</h2>
<button class="p-xs hover:bg-surface-container rounded-full text-on-surface-variant transition-colors group">
<span class="material-symbols-outlined group-hover:text-on-surface">close</span>
</button>
</header>
<!-- Content/Form -->
<div class="flex-1 overflow-y-auto px-lg py-xl flex flex-col gap-xl">
<!-- Information Density Note / Reasoning Log style intro -->
<div class="bg-surface-container-low border border-outline-variant rounded p-md flex flex-col gap-xs">
<div class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 18px;">info</span>
<span class="font-mono-log text-mono-log">Policy Update Notice</span>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Modifications to verification strictness will immediately impact inbound rider artifact requirements.</p>
</div>
<form class="flex flex-col gap-lg">
<!-- Auto-Refund Limit -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="refund-limit">Auto-Refund Limit</label>
<div class="relative flex items-center">
<span class="absolute left-md font-mono-log text-mono-log text-on-surface-variant pointer-events-none">RM</span>
<input class="w-full pl-[48px] pr-md py-sm border border-outline rounded bg-surface-container-lowest text-on-surface font-mono-log text-mono-log focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all shadow-sm" id="refund-limit" type="text" value="50.00"/>
</div>
</div>
<!-- Verification Strictness -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="verification-strictness">Verification Strictness</label>
<div class="relative">
<select class="w-full px-md py-sm border border-outline rounded bg-surface-container-lowest text-on-surface font-body-base text-body-base appearance-none focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all shadow-sm" id="verification-strictness">
<option value="relaxed">Relaxed</option>
<option selected="" value="standard">Standard</option>
<option value="paranoid">Paranoid</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">unfold_more</span>
</div>
</div>
<!-- Required Artifacts -->
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Required Artifacts</label>
<div class="flex flex-col border border-outline-variant rounded bg-surface-container-lowest overflow-hidden shadow-sm">
<label class="flex items-center gap-md p-md border-b border-surface-variant hover:bg-surface-container-low cursor-pointer transition-colors">
<input checked="" class="w-[18px] h-[18px] rounded-sm border-outline text-primary-container focus:ring-primary-container cursor-pointer transition-colors bg-surface-container-lowest" type="checkbox"/>
<div class="flex flex-col">
<span class="font-body-base text-body-base text-on-surface font-medium">Rider ID</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Mandatory identity verification.</span>
</div>
</label>
<label class="flex items-center gap-md p-md border-b border-surface-variant hover:bg-surface-container-low cursor-pointer transition-colors">
<input checked="" class="w-[18px] h-[18px] rounded-sm border-outline text-primary-container focus:ring-primary-container cursor-pointer transition-colors bg-surface-container-lowest" type="checkbox"/>
<div class="flex flex-col">
<span class="font-body-base text-body-base text-on-surface font-medium">Package Photo</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Visual proof of condition at handoff.</span>
</div>
</label>
<label class="flex items-center gap-md p-md hover:bg-surface-container-low cursor-pointer transition-colors">
<input class="w-[18px] h-[18px] rounded-sm border-outline text-primary-container focus:ring-primary-container cursor-pointer transition-colors bg-surface-container-lowest" type="checkbox"/>
<div class="flex flex-col">
<span class="font-body-base text-body-base text-on-surface font-medium">GPS Tag</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Location metadata attached to artifacts.</span>
</div>
</label>
</div>
</div>
</form>
</div>
<!-- Footer / Actions -->
<footer class="p-lg border-t border-surface-variant bg-surface-container-lowest flex justify-end gap-md">
<button class="px-lg py-sm border border-outline rounded font-label-caps text-label-caps text-on-surface hover:bg-surface-container-high transition-colors focus:outline-none focus:ring-2 focus:ring-outline-variant focus:ring-offset-1">
                Cancel
            </button>
<button class="px-lg py-sm bg-primary-container text-on-primary rounded font-label-caps text-label-caps hover:bg-on-primary-fixed-variant transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-1">
                Update Policy
            </button>
</footer>
</aside>
</body></html>
